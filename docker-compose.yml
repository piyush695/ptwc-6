version: '3.9'

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: holaprime_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: holaprime_worldcup
      POSTGRES_USER: holaprime
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holaprime -d holaprime_worldcup"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js App ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: holaprime_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://holaprime:${POSTGRES_PASSWORD:-changeme}@db:5432/holaprime_worldcup

      # Auth
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}

      # Email
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}

      # KYC
      SUMSUB_APP_TOKEN: ${SUMSUB_APP_TOKEN}
      SUMSUB_SECRET_KEY: ${SUMSUB_SECRET_KEY}
      SUMSUB_WEBHOOK_SECRET: ${SUMSUB_WEBHOOK_SECRET}

      # Chatbot
      CHAT_PROVIDER: ${CHAT_PROVIDER:-none}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Storage
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}

      # Broker webhook
      BROKER_WEBHOOK_SECRET: ${BROKER_WEBHOOK_SECRET}

      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/public/uploads

  # ── DB Migration runner (runs once on startup) ───────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: holaprime_migrate
    command: npx prisma db push --skip-generate
    environment:
      DATABASE_URL: postgresql://holaprime:${POSTGRES_PASSWORD:-changeme}@db:5432/holaprime_worldcup
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── Nginx reverse proxy (optional — for SSL termination) ─────────────────────
  # nginx:
  #   image: nginx:alpine
  #   container_name: holaprime_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - app

volumes:
  postgres_data:
  uploads_data:
